<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCG Information Session Registration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --kcg-maroon: #a61d55;
            --kcg-black: #1a1a1a;
            --bg-base: #f1edf1;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-base); padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 650px; margin: auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-top: 10px solid var(--kcg-maroon); position: relative; }
        
        /* Logo Styles */
        .logo-container { text-align: center; margin-bottom: 20px; padding-bottom: 10px; }
        .logo-img { width: 300px; height: auto; display: block; margin: 0 auto; }

        h1 { color: var(--kcg-black); text-align: center; margin: 10px 0 5px 0; font-size: 22px; text-transform: uppercase; letter-spacing: 0.5px; }
        .subtitle { text-align: center; font-weight: bold; margin-bottom: 30px; color: #555; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        
        label { display: block; margin-top: 20px; font-weight: 600; font-size: 14px; color: var(--kcg-black); }
        .required { color: var(--kcg-maroon); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 15px; background-color: #fdfdfd; }
        input:focus, select:focus { border: 2px solid var(--kcg-maroon); outline: none; }
        
        .step { display: none; }
        .step.active { display: block; }
        
        .button-group { display: flex; gap: 10px; margin-top: 30px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-next { background-color: var(--kcg-maroon); color: white; }
        .btn-back { background-color: #eee; color: #555; }
        
        .hidden { display: none; }
        .progress-bar { height: 6px; background: #eee; margin-bottom: 25px; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--kcg-maroon); width: 33%; transition: width 0.4s ease; }
        
        /* Specific PDF Formatting */
        #preview-area { display: none; }
        #pdf-wrap { background: white; padding: 0; } /* Wrapper to ensure no background bleed */
        #pdf-content { 
            padding: 50px; 
            background: white; 
            width: 100%; 
            box-sizing: border-box;
            min-height: 800px;
        }
        .summary-item { border-bottom: 1px solid #f1f1f1; padding: 12px 0; font-size: 14px; display: flex; align-items: flex-start; }
        .summary-item strong { color: var(--kcg-maroon); width: 220px; flex-shrink: 0; }
        .summary-value { flex-grow: 1; color: #333; }
        
        .pdf-header { text-align: center; margin-bottom: 30px; border-bottom: 3px solid var(--kcg-maroon); padding-bottom: 20px; }
        .pdf-logo { width: 280px; height: auto; margin: 0 auto 15px auto; display: block; }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <div class="logo-container">
        <img src="logo.svg" alt="KCG Logo" class="logo-img">
    </div>

    <h1>KCGI INFORMATION SESSION</h1>
    <p class="subtitle">京都情報大学院大学 - 2026 October Intake</p>
    
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <form id="kcgiFullForm">
        <div class="step active" id="step1">
            <label>Email Address <span class="required">*</span></label>
            <input type="email" name="email" required>
            <label>Last Name <span class="required">*</span></label>
            <input type="text" name="lastName" required>
            <label>First and Middle Name <span class="required">*</span></label>
            <input type="text" name="firstName" required>
            <label>Gender <span class="required">*</span></label>
            <select name="gender" required><option value="">Select</option><option value="Male">Male</option><option value="Female">Female</option></select>
            <label>Nationality <span class="required">*</span></label>
            <input type="text" name="nationality" required>
            <label>Phone Number <span class="required">*</span></label>
            <input type="tel" name="phone" required>
            <div class="button-group"><button type="button" class="btn-next" onclick="nextStep(2)">Next Step</button></div>
        </div>

        <div class="step" id="step2">
            <label>Academic Qualification <span class="required">*</span></label>
            <select name="qualification" required><option value="">Select</option><option value="Bachelors">Bachelors</option><option value="Masters">Masters</option></select>
            <label>University Name <span class="required">*</span></label>
            <input type="text" name="uniName" required>
            <label>Total Academic Years <span class="required">*</span></label>
            <select name="academicYears" onchange="checkOthers(this, 'otherYearsInput')" required>
                <option value="">Select</option><option value="14">14</option><option value="15">15</option><option value="16">16</option><option value="17">17</option><option value="18">18</option><option value="Others">Others</option>
            </select>
            <input type="text" name="otherYears" id="otherYearsInput" class="hidden" placeholder="Specify years">
            
            <label>Desired Concentration <span class="required">*</span></label>
            <select name="concentration" required>
                <option value="">Select Concentration</option>
                <option value="Artificial Intelligence">Artificial Intelligence</option>
                <option value="Data Science">Data Science</option>
                <option value="Web System Development">Web System Development</option>
                <option value="Network Administration">Network Administration</option>
                <option value="Enterprise Resource Planning">Enterprise Resource Planning</option>
                <option value="Global Entrepreneurship">Global Entrepreneurship</option>
                <option value="IT Manga & Anime">IT Manga & Anime</option>
                <option value="IT Tourism">IT Tourism</option>
                <option value="IT Entertainment">IT Entertainment</option>
            </select>
            <div class="button-group">
                <button type="button" class="btn-back" onclick="nextStep(1)">Back</button>
                <button type="button" class="btn-next" onclick="nextStep(3)">Next Step</button>
            </div>
        </div>

        <div class="step" id="step3">
            <label>Current Status <span class="required">*</span></label>
            <select name="status" onchange="checkOthers(this, 'otherStatusInput')" required><option value="">Select</option><option value="Student">Student</option><option value="Employee">Employee</option><option value="Unemployed">Unemployed</option><option value="Others">Others</option></select>
            <input type="text" name="otherStatus" id="otherStatusInput" class="hidden" placeholder="Specify status">
            <label>Current City <span class="required">*</span></label>
            <input type="text" name="city" required>
            <label>Applied to Japan before? <span class="required">*</span></label>
            <select name="appliedBefore" id="appliedBefore" onchange="toggleVisaSection()" required><option value="No">No</option><option value="Yes">Yes</option></select>
            <div id="visaSection" class="hidden"><label>Visa Type</label><input type="text" name="visaDetails"></div>
            
            <label>Future Plan <span class="required">*</span></label>
            <select name="futurePlan" required>
                <option value="">Select Plan</option>
                <option value="Work in Japan">Work in Japan</option>
                <option value="Continue further studies">Continue further studies</option>
                <option value="Return to home country">Return to home country</option>
            </select>

            <div class="button-group">
                <button type="button" class="btn-back" onclick="nextStep(2)">Back</button>
                <button type="submit" class="btn-next">Submit & Preview</button>
            </div>
        </div>
    </form>
</div>

<div class="container" id="preview-area">
    <div id="pdf-wrap">
        <div id="pdf-content">
            <div class="pdf-header">
                <img src="
