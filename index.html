<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCG Information Session Registration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --kcg-maroon: #a61d55;
            --kcg-black: #1a1a1a;
            --bg-base: #f1edf1;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background-color: var(--bg-base); padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 650px; margin: auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border-top: 10px solid var(--kcg-maroon); position: relative; }
        
        /* SVG Logo Styling */
        .logo-container { text-align: center; margin-bottom: 20px; padding-bottom: 10px; }
        .logo-img { width: 100%; max-width: 400px; height: auto; display: block; margin: 0 auto; }

        h1 { color: var(--kcg-black); text-align: center; margin: 10px 0 5px 0; font-size: 22px; text-transform: uppercase; letter-spacing: 0.5px; }
        .subtitle { text-align: center; font-weight: bold; margin-bottom: 30px; color: #555; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        
        label { display: block; margin-top: 20px; font-weight: 600; font-size: 14px; color: var(--kcg-black); }
        .required { color: var(--kcg-maroon); }
        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 15px; background-color: #fdfdfd; }
        input:focus { border: 2px solid var(--kcg-maroon); outline: none; }
        
        /* Step Logic */
        .step { display: none; }
        .step.active { display: block; }
        
        .button-group { display: flex; gap: 10px; margin-top: 30px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        .btn-next { background-color: var(--kcg-maroon); color: white; }
        .btn-next:hover { opacity: 0.85; }
        .btn-back { background-color: #eee; color: #555; }
        .btn-submit { background-color: var(--kcg-maroon); color: white; }
        
        #preview-area { display: none; background: #fff; }
        .progress-bar { height: 6px; background: #eee; margin-bottom: 25px; border-radius: 3px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--kcg-maroon); width: 33%; transition: width 0.4s ease; }
        
        .pdf-box { padding: 20px; background: white; }
    </style>
</head>
<body>

<div class="container" id="form-container">
    <div class="logo-container">
        <img src="logo.svg" alt="KCG Logo" class="logo-img">
    </div>

    <h1>KCGI INFORMATION SESSION</h1>
    <p class="subtitle">京都情報大学院大学 - 2026 October Intake</p>
    
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <form id="kcgiFullForm">
        <div class="step active" id="step1">
            <label>Email Address <span class="required">*</span></label>
            <input type="email" name="email" required>

            <label>Last Name <span class="required">*</span></label>
            <input type="text" name="lastName" required>

            <label>First and Middle Name <span class="required">*</span></label>
            <input type="text" name="firstName" required>

            <label>Gender <span class="required">*</span></label>
            <select name="gender" required>
                <option value="">Select</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>

            <label>Nationality <span class="required">*</span></label>
            <input type="text" name="nationality" required>

            <label>Phone Number <span class="required">*</span></label>
            <input type="tel" name="phone" required>

            <div class="button-group">
                <button type="button" class="btn-next" onclick="nextStep(2)">Next Step</button>
            </div>
        </div>

        <div class="step" id="step2">
            <label>Academic Qualification <span class="required">*</span></label>
            <input type="text" name="qualification" required>

            <label>University/College Name <span class="required">*</span></label>
            <input type="text" name="uniName" required>

            <label>Total Academic Years <span class="required">*</span></label>
            <input type="number" name="academicYears" required>

            <label>Intended Intake <span class="required">*</span></label>
            <select name="intake" required>
                <option value="Oct 2026">October 2026</option>
                <option value="April 2027">April 2027</option>
            </select>

            <label>Desired Concentration <span class="required">*</span></label>
            <select name="concentration" required>
                <option value="ERP">ERP</option>
                <option value="Data Science">Data Science</option>
                <option value="Cybersecurity">Cybersecurity</option>
                <option value="Animation/CG">Animation/CG</option>
            </select>

            <div class="button-group">
                <button type="button" class="btn-back" onclick="nextStep(1)">Back</button>
                <button type="button" class="btn-next" onclick="nextStep(3)">Next Step</button>
            </div>
        </div>

        <div class="step" id="step3">
            <label>Current City <span class="required">*</span></label>
            <input type="text" name="city" required>

            <label>Current Status <span class="required">*</span></label>
            <input type="text" name="status" required>

            <label>Have you ever applied to Japan before? <span class="required">*</span></label>
            <select name="appliedBefore" id="appliedBefore" onchange="toggleVisaSection()" required>
                <option value="No">No</option>
                <option value="Yes">Yes</option>
            </select>

            <div id="visaSection" class="hidden">
                <label>What kind of visa? <span class="required">*</span></label>
                <input type="text" name="visaDetails" id="visaInput">
            </div>

            <label>Future Plan <span class="required">*</span></label>
            <textarea name="futurePlan" rows="3" required></textarea>

            <label>Remarks</label>
            <textarea name="remarks" rows="2"></textarea>

            <div class="button-group">
                <button type="button" class="btn-back" onclick="nextStep(2)">Back</button>
                <button type="submit" class="btn-submit">Submit & Generate PDF</button>
            </div>
        </div>
    </form>
</div>

<div class="container" id="preview-area" style="background: white; border-top: 10px solid var(--kcg-maroon);">
    <div id="pdf-content" class="pdf-box">
        <img src="logo.svg" alt="KCG Logo" style="max-height: 60px; margin-bottom: 20px;">
        <h2 style="color:var(--kcg-maroon); border-bottom: 2px solid var(--kcg-maroon);">Registration Summary</h2>
        <div id="summary-output"></div>
        <p style="margin-top: 20px; font-size: 11px; color: gray;">Submitted: <span id="subDate"></span></p>
    </div>
    <div class="button-group">
        <button onclick="downloadPDF()" class="btn-next">Download Confirmation PDF</button>
        <button onclick="window.location.reload()" class="btn-back">New Response</button>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx1l9BDOF-UJ276PRgoY-t4J7kTS3pA0MQcc9RRlHW1o8FZ3Gu09GlDKaRJmK0tu1LX/exec';

    function nextStep(stepNumber) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + stepNumber).classList.add('active');
        const progress = (stepNumber / 3) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        window.scrollTo(0,0);
    }

    function toggleVisaSection() {
        const isYes = document.getElementById('appliedBefore').value === 'Yes';
        document.getElementById('visaSection').classList.toggle('hidden', !isYes);
        document.getElementById('visaInput').required = isYes;
    }

    document.getElementById('kcgiFullForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const formData = new FormData(this);

        fetch(SCRIPT_URL, { method: 'POST', body: formData });

        let html = "";
        formData.forEach((value, key) => {
            if(value) {
                let label = key.replace(/([A-Z])/g, ' $1').toUpperCase();
                html += `<p style="border-bottom: 1px solid #f1f1f1; padding: 6px 0;"><strong>${label}:</strong> ${value}</p>`;
            }
        });
        document.getElementById('summary-output').innerHTML = html;
        document.getElementById('subDate').innerText = new Date().toLocaleString();

        document.getElementById('form-container').style.display = 'none';
        document.getElementById('preview-area').style.display = 'block';
    });

    function downloadPDF() {
        const element = document.getElementById('pdf-content');
        const opt = {
            margin: 10,
            filename: 'KCG_Registration_Form.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
