<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCGI Registration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #eef2f7; padding: 20px; }
        .card { background: white; max-width: 600px; margin: auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #004a99; margin-top: 0; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #004a99; color: white; border: none; border-radius: 4px; margin-top: 20px; cursor: pointer; font-size: 16px; }
        #preview-area { display: none; }
    </style>
</head>
<body>

<div class="card" id="form-container">
    <h1>KCGI INFORMATION SESSION</h1>
    <form id="kcgiForm">
        <label>Email Address</label>
        <input type="email" name="email" required>

        <label>Full Name</label>
        <input type="text" name="fullName" required>

        <label>Nationality</label>
        <input type="text" name="nationality" required>

        <label>Intended Intake</label>
        <select name="intake">
            <option>October 2026</option>
            <option>April 2027</option>
        </select>

        <button type="submit">Submit & Preview PDF</button>
    </form>
</div>

<div class="card" id="preview-area">
    <h2>Submission Preview</h2>
    <div id="output"></div>
    <button onclick="downloadPDF()">Download PDF</button>
</div>

<script>
    // Replace the URL below with your Google Script URL
    const SCRIPT_URL = 'PASTE_YOUR_URL_HERE';

    document.getElementById('kcgiForm').onsubmit = function(e) {
        e.preventDefault();
        const formData = new FormData(this);
        
        // Show Preview
        let html = "";
        formData.forEach((v, k) => { html += `<p><b>${k}:</b> ${v}</p>`; });
        document.getElementById('output').innerHTML = html;
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('preview-area').style.display = 'block';

        // Send to Sheets
        fetch(SCRIPT_URL, { method: 'POST', body: formData }).catch(err => console.log(err));
    };

    function downloadPDF() {
        const element = document.getElementById('preview-area');
        html2pdf().from(element).save('KCGI_Registration.pdf');
    }
</script>
</body>
</html>
